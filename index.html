<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokePrint Order Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --success: #10b981;
            --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6;
            --bg: #0f172a; --surface: #1e293b; --surface-light: #334155;
            --text: #f8fafc; --text-muted: #94a3b8; --border: #334155;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; padding: 1rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            margin-bottom: 1.5rem; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 1rem;
        }
        h1 {
            font-size: 1.75rem;
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.75rem; margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--surface); padding: 1rem; border-radius: 10px;
            border: 1px solid var(--border); border-left: 4px solid var(--primary);
        }
        .stat-card.pending { border-left-color: var(--warning); }
        .stat-card.paid { border-left-color: var(--success); }
        .stat-card.revenue { border-left-color: var(--info); }
        .stat-card.profit { border-left-color: #a855f7; }
        .stat-card.filament { border-left-color: #f472b6; }
        .stat-card.low { border-left-color: var(--danger); }
        .stat-card.shopping { border-left-color: #8b5cf6; cursor: pointer; }
        .stat-card.shopping:hover { background: rgba(139, 92, 246, 0.1); }
        .stat-label { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 0.25rem; }
        .controls {
            display: flex; gap: 0.75rem; margin-bottom: 1.5rem;
            flex-wrap: wrap; align-items: center;
        }
        .btn {
            padding: 0.6rem 1.2rem; border: none; border-radius: 8px; cursor: pointer;
            font-weight: 600; transition: all 0.2s; display: inline-flex;
            align-items: center; gap: 0.5rem; font-size: 0.9rem;
            background: var(--surface); color: var(--text); border: 1px solid var(--border);
        }
        .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: white; border-color: var(--success); }
        .btn-warning { background: var(--warning); color: white; border-color: var(--warning); }
        .btn-info { background: var(--info); color: white; border-color: var(--info); }
        .btn-filament {
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
            color: white; border-color: #ec4899;
        }
        .btn-filament:hover {
            background: linear-gradient(135deg, #f687b3 0%, #f472b6 100%);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
        }
        .search-box { flex: 1; min-width: 200px; position: relative; }
        .search-box input {
            width: 100%; padding: 0.6rem 1rem; background: var(--surface);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 0.9rem;
        }
        .sync-status {
            font-size: 0.8rem; color: var(--text-muted); margin-left: auto;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .customer-group {
            background: var(--surface); border-radius: 12px;
            border: 1px solid var(--border); margin-bottom: 1rem;
            overflow: hidden;
        }
        .order-card {
            background: var(--bg); border-radius: 10px; border: 1px solid var(--border);
            overflow: hidden; transition: all 0.3s;
        }
        .filament-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem; margin-top: 1rem;
        }
        .filament-card {
            background: var(--bg); border: 2px solid var(--border);
            border-radius: 10px; padding: 1rem;
        }
        .filament-card.critical { border-color: var(--danger); }
        .filament-bar {
            height: 8px; background: var(--surface-light);
            border-radius: 4px; overflow: hidden; margin: 0.5rem 0;
        }
        .filament-bar-fill { height: 100%; border-radius: 4px; }
        .filament-bar-fill.critical { background: var(--danger); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); display: none;
            align-items: center; justify-content: center; z-index: 1000; padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface); border-radius: 12px; width: 100%;
            max-width: 700px; max-height: 90vh; overflow-y: auto;
            border: 1px solid var(--border);
        }
        .hidden { display: none !important; }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ PokePrint Tracker</h1>
            <button class="btn btn-primary" onclick="openOrderModal()">+ New Order</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card pending">
                <div class="stat-label">Pending</div>
                <div class="stat-value" id="stat-pending">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Printing</div>
                <div class="stat-value" id="stat-printing">0</div>
            </div>
            <div class="stat-card paid">
                <div class="stat-label">Completed</div>
                <div class="stat-value" id="stat-completed">0</div>
            </div>
            <div class="stat-card filament">
                <div class="stat-label">Filament Colors</div>
                <div class="stat-value" id="stat-filament">0</div>
            </div>
            <div class="stat-card low">
                <div class="stat-label">Low Stock</div>
                <div class="stat-value" id="stat-low">0</div>
            </div>
            <div class="stat-card shopping" onclick="openShoppingModal()">
                <div class="stat-label">🛒 Shopping</div>
                <div class="stat-value" id="stat-shopping">0</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search..." onkeyup="filterOrders()">
            </div>
            <button class="btn btn-filament" onclick="openFilamentModal()">🧵 Filament</button>
            <button class="btn btn-info" onclick="syncWithGoogleSheets()" id="syncBtn">🔄 Sync</button>
            <div class="sync-status" id="syncStatus"></div>
        </div>

        <div id="activeOrders" class="orders-container">
            <div class="loading-state">Loading...</div>
        </div>
    </div>

    <div class="modal-overlay" id="filamentModal">
        <div class="modal">
            <div class="modal-header">
                <h2>🧵 Filament Inventory</h2>
                <button class="btn-close" onclick="closeModal('filamentModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="filament-grid" id="filamentGrid"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="shoppingModal">
        <div class="modal">
            <div class="modal-header">
                <h2>🛒 Shopping List</h2>
                <button class="btn-close" onclick="closeModal('shoppingModal')">×</button>
            </div>
            <div class="modal-body">
                <div id="shoppingList"></div>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEETS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz12TJjO8EKX5WH0AJhRPMMiQEvIjKn4Vy4ZJVkBh-RmJwbP-3l7s5KwcIQu65cEZSy9A/exec';

        let filamentInventory = {};
        const LOW_THRESHOLD = 200;

        function openFilamentModal() {
            renderFilamentGrid();
            document.getElementById('filamentModal').classList.add('active');
        }

        function openShoppingModal() {
            renderShoppingList();
            document.getElementById('shoppingModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function renderFilamentGrid() {
            const grid = document.getElementById('filamentGrid');
            const colors = Object.keys(filamentInventory).sort();

            grid.innerHTML = colors.map(color => {
                const grams = filamentInventory[color];
                const isLow = grams <= LOW_THRESHOLD;
                const statusClass = isLow ? 'critical' : 'good';
                const percentage = Math.min(100, (grams / 1000) * 100);

                return `
                    <div class="filament-card ${statusClass}">
                        <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;">
                            <strong>${color}</strong>
                            <span style="color:${isLow?'#ef4444':'#10b981'};">${isLow?'LOW!':'OK'}</span>
                        </div>
                        <div style="font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;">${grams}g</div>
                        <div class="filament-bar">
                            <div class="filament-bar-fill ${statusClass}" style="width:${percentage}%;background:${isLow?'#ef4444':'#10b981'}"></div>
                        </div>
                        <button class="btn btn-success" style="width:100%;margin-top:0.5rem;" onclick="addFilament('${color}', 1000)">+1000g</button>
                    </div>
                `;
            }).join('');
        }

        function renderShoppingList() {
            const list = document.getElementById('shoppingList');
            const lowColors = Object.entries(filamentInventory).filter(([c, g]) => g <= LOW_THRESHOLD);

            if (lowColors.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:2rem;color:#10b981;">🎉 All stocked up!</div>';
                return;
            }

            list.innerHTML = lowColors.map(([color, grams]) => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem;background:var(--bg);border:2px solid #ef4444;border-radius:10px;margin-bottom:0.5rem;">
                    <div>
                        <strong>${color}</strong>
                        <div style="color:var(--text-muted);font-size:0.85rem;">Only ${grams}g left</div>
                    </div>
                    <button class="btn btn-success" onclick="addFilament('${color}', 1000);renderShoppingList();">Mark Purchased</button>
                </div>
            `).join('');
        }

        function addFilament(color, amount) {
            filamentInventory[color] = (filamentInventory[color] || 0) + amount;
            updateFilamentStats();
            renderFilamentGrid();
        }

        function updateFilamentStats() {
            const count = Object.keys(filamentInventory).length;
            const low = Object.values(filamentInventory).filter(g => g <= LOW_THRESHOLD).length;
            document.getElementById('stat-filament').textContent = count;
            document.getElementById('stat-low').textContent = low;
            document.getElementById('stat-shopping').textContent = low;
        }

        // Initialize with sample data
        function init() {
            filamentInventory = {
                "Lemon Yellow": 1000,
                "Charcoal Black": 1000,
                "Ice Blue": 1000,
                "Mandarin Orange": 1000,
                "Desert Tan": 1000
            };
            updateFilamentStats();
        }

        init();
    </script>
</body>
</html>
