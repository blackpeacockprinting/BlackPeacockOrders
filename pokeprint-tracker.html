<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poke Print Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Poke Print Tracker</h1>
    </header>
    <main>
        <section id="active-orders">
            <h2>Active Orders</h2>
            <table>
                <thead>
                    <tr>
                        <th>Customer Name</th>
                        <th>Order ID</th>
                        <th>Pokemon Recipe</th>
                        <th>Quantity</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Active orders will be populated here -->
                </tbody>
            </table>
        </section>
        <section id="inventory-management">
            <h2>Inventory Management</h2>
            <button id="restock-button">Restock Item</button>
            <div id="restock-modal" class="modal">
                <form id="restock-form">
                    <label for="item-name">Item Name:</label>
                    <input type="text" id="item-name" required>
                    <label for="item-quantity">Quantity:</label>
                    <input type="number" id="item-quantity" required>
                    <button type="submit">Submit</button>
                </form>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Current Stock</th>
                        <th>Restock Level</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Inventory items will be populated here -->
                </tbody>
            </table>
        </section>
        <section id="order-management">
            <h2>Order Management</h2>
            <button id="import-orders">Import Orders</button>
            <button id="export-orders">Export Orders</button>
            <div id="order-modal" class="modal">
                <form id="order-form">
                    <label for="customer-name">Customer Name:</label>
                    <input type="text" id="customer-name" required>
                    <label for="order-id">Order ID:</label>
                    <input type="text" id="order-id" required>
                    <label for="pokemon-recipe">Pokemon Recipe:</label>
                    <input type="text" id="pokemon-recipe" required>
                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" required>
                    <button type="submit">Add Order</button>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <p>© 2026 Black Peacock Printing</p>
    </footer>
</body>
</html>
