<div class="inventory-dashboard">
    <h2>Inventory Dashboard</h2>
    <div class="inventory-stats">
        <h3>Inventory Stats</h3>
        <p>Total Items: <span id="total-items">0</span></p>
        <p>Low Stock Alerts: <span id="low-stock-alerts">0</span></p>
    </div>
    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Restock</th>
            </tr>
        </thead>
        <tbody>
            <!-- Inventory items will be populated here -->
        </tbody>
    </table>
    <form id="restock-form">
        <h3>Restock Item</h3>
        <label for="item-name">Item Name:</label>
        <input type="text" id="item-name" name="item-name" required>
        <label for="item-quantity">Quantity:</label>
        <input type="number" id="item-quantity" name="item-quantity" required>
        <button type="submit">Restock</button>
    </form>
</div>
<style>
    .inventory-dashboard { margin: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
    .inventory-stats { margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    form { margin-top: 20px; }
</style>
