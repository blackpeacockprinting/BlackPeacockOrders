<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokePrint Order Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .pokeball { width: 24px; height: 24px; border-radius: 50%; position: relative; overflow: hidden; }
        .pokeball::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%; background: #ef4444; }
        .pokeball::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 50%; background: white; }
        .pokeball-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background: white; border: 2px solid #333; border-radius: 50%; z-index: 10; }
        .pokeball-gold::before { background: #fbbf24; }
        .pokeball-gold .pokeball-center { border-color: #d97706; }
        .shiny-badge { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
        .mystery-badge { background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="max-w-4xl mx-auto p-4">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold">PokePrint Order Tracker</h1>
                <p class="text-gray-400 text-sm">Firebase Edition</p>
            </div>
            <button onclick="openNewOrderModal()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg font-semibold flex items-center gap-2">
                <span>+</span> New Order
            </button>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6" id="stats">
            <div class="bg-gray-800 p-3 rounded-lg text-center">
                <div class="text-2xl font-bold text-yellow-400" id="stat-pending">0</div>
                <div class="text-xs text-gray-400">Pending</div>
            </div>
            <div class="bg-gray-800 p-3 rounded-lg text-center">
                <div class="text-2xl font-bold text-blue-400" id="stat-printing">0</div>
                <div class="text-xs text-gray-400">Printing</div>
            </div>
            <div class="bg-gray-800 p-3 rounded-lg text-center">
                <div class="text-2xl font-bold text-green-400" id="stat-completed">0</div>
                <div class="text-xs text-gray-400">Completed</div>
            </div>
            <div class="bg-gray-800 p-3 rounded-lg text-center">
                <div class="text-2xl font-bold text-purple-400" id="stat-total">$0</div>
                <div class="text-xs text-gray-400">Total Value</div>
            </div>
        </div>

        <!-- Orders List -->
        <div id="orders-list" class="space-y-3"></div>
    </div>

    <!-- New Order Modal -->
    <div id="new-order-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-gray-800 rounded-xl max-w-md w-full p-6 max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-4">New Order</h2>
            <input type="text" id="customer-name" placeholder="Customer Name" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-3 text-white">
            <input type="email" id="customer-email" placeholder="Email (optional)" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-3 text-white">
            <input type="text" id="customer-phone" placeholder="Phone (optional)" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-4 text-white">
            
            <div id="order-items" class="space-y-2 mb-4"></div>
            
            <button onclick="addItemField()" class="w-full bg-gray-700 hover:bg-gray-600 py-2 rounded-lg mb-4">+ Add Item</button>
            
            <div class="flex gap-2">
                <button onclick="closeNewOrderModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-lg">Cancel</button>
                <button onclick="saveOrder()" class="flex-1 bg-red-600 hover:bg-red-700 py-3 rounded-lg font-semibold">Save Order</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBTp9aLB3VaKIKpztrR029mG3mVEw5MNOQ",
            authDomain: "blackpeacockprinting-fbb65.firebaseapp.com",
            projectId: "blackpeacockprinting-fbb65",
            storageBucket: "blackpeacockprinting-fbb65.firebasestorage.app",
            messagingSenderId: "1025287520257",
            appId: "1:1025287520257:web:ff8d4ab1b69fd859c20000"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let orders = [];
        let designs = [];
        let itemCount = 0;
        
        // Load data
        db.collection('orders').onSnapshot(snapshot => {
            orders = [];
            snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
            renderOrders();
            updateStats();
        });
        
        db.collection('designs').onSnapshot(snapshot => {
            designs = [];
            snapshot.forEach(doc => designs.push({ id: doc.id, ...doc.data() }));
        });
        
        function renderOrders() {
            const container = document.getElementById('orders-list');
            if (orders.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-8">No orders yet</div>';
                return;
            }
            
            container.innerHTML = orders.map(order => `
                <div class="bg-gray-800 rounded-xl p-4">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="font-bold text-lg">${order.customerName}</h3>
                            <p class="text-gray-400 text-sm">${order.items?.length || 0} items</p>
                        </div>
                        <div class="flex gap-2">
                            <span class="text-green-400 font-bold">$${order.total?.toFixed(2) || '0.00'}</span>
                            <button onclick="deleteOrder('${order.id}')" class="text-red-400 hover:text-red-300 ml-2" title="Delete Order">🗑️</button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        ${(order.items || []).map((item, idx) => `
                            <div class="flex items-center justify-between bg-gray-700/50 rounded-lg p-2">
                                <div class="flex items-center gap-2">
                                    <div class="pokeball ${item.shiny ? 'pokeball-gold' : ''}">
                                        <div class="pokeball-center"></div>
                                    </div>
                                    <span class="${item.shiny ? 'text-yellow-400' : ''}">${item.name}</span>
                                    ${item.shiny ? '<span class="shiny-badge text-xs px-2 py-0.5 rounded">✨</span>' : ''}
                                    ${item.mystery ? '<span class="mystery-badge text-xs px-2 py-0.5 rounded">?</span>' : ''}
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-gray-400">$${item.price?.toFixed(2) || '0.00'}</span>
                                    <button onclick="toggleShiny('${order.id}', ${idx})" class="text-xs bg-gray-600 hover:bg-gray-500 px-2 py-1 rounded">
                                        ${item.shiny ? 'Unshiny' : '✨ Shiny'}
                                    </button>
                                    ${item.qty > 1 ? `<button onclick="splitItem('${order.id}', ${idx})" class="text-xs bg-blue-600 hover:bg-blue-500 px-2 py-1 rounded">Split</button>` : ''}
                                    <select onchange="updateItemStatus('${order.id}', ${idx}, this.value)" class="bg-gray-600 rounded text-xs px-2 py-1">
                                        <option value="pending" ${item.status === 'pending' ? 'selected' : ''}>Pending</option>
                                        <option value="printing" ${item.status === 'printing' ? 'selected' : ''}>Printing</option>
                                        <option value="completed" ${item.status === 'completed' ? 'selected' : ''}>Complete</option>
                                    </select>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        function updateStats() {
            let pending = 0, printing = 0, completed = 0, total = 0;
            orders.forEach(order => {
                (order.items || []).forEach(item => {
                    if (item.status === 'pending') pending++;
                    else if (item.status === 'printing') printing++;
                    else if (item.status === 'completed') completed++;
                });
                total += order.total || 0;
            });
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-printing').textContent = printing;
            document.getElementById('stat-completed').textContent = completed;
            document.getElementById('stat-total').textContent = '$' + total.toFixed(0);
        }
        
        // Delete Order
        function deleteOrder(orderId) {
            if (confirm('Delete this order? This cannot be undone.')) {
                db.collection('orders').doc(orderId).delete();
            }
        }
        
        // Toggle Shiny (price stays same)
        function toggleShiny(orderId, itemIdx) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            
            const items = [...order.items];
            items[itemIdx].shiny = !items[itemIdx].shiny;
            
            // Price stays the same - no recalculation needed
            db.collection('orders').doc(orderId).update({ items });
        }
        
        // Split Item
        function splitItem(orderId, itemIdx) {
            const order = orders.find(o => o.id === orderId);
            if (!order || order.items[itemIdx].qty <= 1) return;
            
            const items = [...order.items];
            const item = items[itemIdx];
            
            item.qty--;
            items.splice(itemIdx + 1, 0, {
                ...item,
                qty: 1,
                shiny: false,
                status: 'pending'
            });
            
            db.collection('orders').doc(orderId).update({ items });
        }
        
        // Update Item Status
        function updateItemStatus(orderId, itemIdx, status) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            
            const items = [...order.items];
            items[itemIdx].status = status;
            
            const allComplete = items.every(i => i.status === 'completed');
            
            db.collection('orders').doc(orderId).update({ 
                items, 
                status: allComplete ? 'completed' : 'active'
            });
        }
        // New Order Modal
        function openNewOrderModal() {
            document.getElementById('new-order-modal').classList.remove('hidden');
            itemCount = 0;
            document.getElementById('order-items').innerHTML = '';
            addItemField();
        }
        
        function closeNewOrderModal() {
            document.getElementById('new-order-modal').classList.add('hidden');
        }
        
        function addItemField() {
            itemCount++;
            const div = document.createElement('div');
            div.className = 'flex gap-2';
            div.innerHTML = `
                <select id="item-${itemCount}" class="flex-1 bg-gray-700 rounded-lg px-3 py-2 text-white">
                    <option value="">Select Pokemon...</option>
                    ${designs.map(d => `<option value="${d.id}" data-price="${d.price || 5}">${d.name} - $${d.price || 5}</option>`).join('')}
                </select>
                <input type="number" id="qty-${itemCount}" value="1" min="1" class="w-16 bg-gray-700 rounded-lg px-3 py-2 text-white text-center">
            `;
            document.getElementById('order-items').appendChild(div);
        }
        
        function saveOrder() {
            const customerName = document.getElementById('customer-name').value.trim();
            if (!customerName) return alert('Enter customer name');
            
            const items = [];
            let total = 0;
            
            for (let i = 1; i <= itemCount; i++) {
                const select = document.getElementById(`item-${i}`);
                const qtyInput = document.getElementById(`qty-${i}`);
                
                if (!select || !select.value) continue;
                
                const design = designs.find(d => d.id === select.value);
                const qty = parseInt(qtyInput?.value) || 1;
                const price = design?.price || 5;
                
                items.push({
                    name: design?.name || 'Unknown',
                    designId: select.value,
                    qty: qty,
                    price: price,
                    shiny: false,
                    mystery: false,
                    status: 'pending'
                });
                
                total += price * qty;
            }
            
            if (items.length === 0) return alert('Add at least one item');
            
            db.collection('orders').add({
                customerName,
                customerEmail: document.getElementById('customer-email').value,
                customerPhone: document.getElementById('customer-phone').value,
                items,
                total,
                status: 'active',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            closeNewOrderModal();
        }
    </script>
</body>
</html>
