<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N3D Sync - DEBUG</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0f0f23; color: #fff; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 20px; border-bottom: 2px solid #e91e63; margin-bottom: 20px; }
        h1 { color: #e91e63; font-size: 1.5rem; }
        .card { background: #1a1a2e; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #333; }
        .card h2 { color: #e91e63; margin-bottom: 12px; font-size: 1.1rem; }
        .btn { background: linear-gradient(45deg, #e91e63, #9c27b0); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 1rem; cursor: pointer; width: 100%; margin-bottom: 8px; }
        .btn:disabled { opacity: 0.5; }
        .btn-secondary { background: #333; }
        .status { padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 0.9rem; }
        .success { background: #1b5e20; }
        .error { background: #b71c1c; }
        .loading { background: #0d47a1; }
        .info { background: #333; }
        pre { background: #0f0f23; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 0.75rem; color: #4caf50; max-height: 300px; margin-top: 12px; }
        .step { padding: 8px; margin: 4px 0; border-radius: 6px; }
        .step-waiting { background: #333; color: #888; }
        .step-done { background: #1b5e20; }
        .step-error { background: #b71c1c; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎱 N3D Sync - DEBUG</h1>
        </header>

        <div class="card">
            <h2>🔍 Initialization</h2>
            <div id="step1" class="step step-waiting">Loading...</div>
            <div id="step2" class="step step-waiting">Loading...</div>
            <div id="step3" class="step step-waiting">Loading...</div>
        </div>

        <div class="card">
            <h2>🧪 Tests</h2>
            <button class="btn" onclick="testFirebase()">Test Firebase</button>
            <button class="btn btn-secondary" onclick="testN3D()">Test N3D API</button>
            <div id="result" class="status info">Click a button</div>
            <pre id="debug">Debug output here...</pre>
        </div>
    </div>

    <script>
        // Step 1: Check if Firebase SDK loaded
        try {
            if (typeof firebase === 'undefined') {
                throw new Error('Firebase SDK not loaded');
            }
            document.getElementById('step1').className = 'step step-done';
            document.getElementById('step1').textContent = '✅ Firebase SDK loaded';
        } catch (e) {
            document.getElementById('step1').className = 'step step-error';
            document.getElementById('step1').textContent = '❌ ' + e.message;
        }

        // Step 2: Initialize Firebase
        let db;
        try {
            firebase.initializeApp({
                apiKey: "AIzaSyBTp9aLB3VaKIKpztrR029mG3mVEw5MNOQ",
                authDomain: "blackpeacockprinting-fbb65.firebaseapp.com",
                projectId: "blackpeacockprinting-fbb65",
                storageBucket: "blackpeacockprinting-fbb65.firebasestorage.app",
                messagingSenderId: "1025287520257",
                appId: "1:1025287520257:web:ff8d4ab1b69fd859c20000"
            });
            document.getElementById('step2').className = 'step step-done';
            document.getElementById('step2').textContent = '✅ Firebase initialized';
            
            db = firebase.firestore();
            document.getElementById('step3').className = 'step step-done';
            document.getElementById('step3').textContent = '✅ Firestore ready';
        } catch (e) {
            document.getElementById('step2').className = 'step step-error';
            document.getElementById('step2').textContent = '❌ Init failed: ' + e.message;
        }

        async function testFirebase() {
            const result = document.getElementById('result');
            const debug = document.getElementById('debug');
            result.className = 'status loading';
            result.textContent = 'Testing...';
            
            try {
                const snap = await db.collection('n3dDesigns').limit(1).get();
                result.className = 'status success';
                result.textContent = '✅ Firebase works! Docs: ' + snap.size;
                debug.textContent = 'Connection successful';
n            } catch (e) {
                result.className = 'status error';
                result.textContent = '❌ Error: ' + e.message;
                debug.textContent = e.stack;
            }
        }

        async function testN3D() {
            const result = document.getElementById('result');
            const debug = document.getElementById('debug');
            result.className = 'status loading';
            result.textContent = 'Testing N3D...';
            
            try {
                const res = await fetch('https://www.n3dmelbourne.com/api/v1/designs', {
                    headers: { 'Authorization': 'Bearer n3d_sk_N49oAN4-H4bniv08z3-Y7D5UZl_W0DcR' }
                });
                const data = await res.json();
                result.className = 'status success';
                result.textContent = '✅ N3D works! Designs: ' + (data.data || []).length;
                debug.textContent = JSON.stringify(data.data[0], null, 2);
            } catch (e) {
                result.className = 'status error';
                result.textContent = '❌ Error: ' + e.message;
                debug.textContent = e.stack;
            }
        }
        
        window.onerror = function(msg, url, line) {
            document.getElementById('debug').textContent = 'JS ERROR: ' + msg + ' at line ' + line;
        };
    </script>
</body>
</html>
