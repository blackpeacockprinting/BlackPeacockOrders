name: Sync N3D Designs - Order Tracker

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-designs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch designs from N3D API
        id: fetch
        env:
          N3D_API_KEY: ${{ secrets.N3D_API_KEY }}
        run: |
          node scripts/sync-designs.js

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "Sync N3D designs: $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
