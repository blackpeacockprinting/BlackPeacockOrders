name: Sync N3D Designs - Order Tracker

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-designs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch designs from N3D API
        env:
          N3D_API_KEY: ${{ secrets.N3D_API_KEY }}
        run: |
          echo "Starting N3D API sync..."
          mkdir -p data

          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/api-response.json             "https://www.n3dmelbourne.com/api/v1/designs?limit=200&page=1&include=details&locale=US"             -H "Authorization: Bearer $N3D_API_KEY"             -H "Content-Type: application/json")

          echo "HTTP Response code: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: API returned HTTP $HTTP_CODE"
            cat /tmp/api-response.json
            exit 1
          fi

          if ! jq empty /tmp/api-response.json 2>/dev/null; then
            echo "Error: Invalid JSON response"
            cat /tmp/api-response.json
            exit 1
          fi

          echo "API call successful!"
          jq '.data' /tmp/api-response.json > /tmp/designs-array.json
          echo "Found $(jq length /tmp/designs-array.json) designs"

      - name: Transform designs
        run: |
          echo "Transforming designs..."

          # Fix: Use proper jq syntax with double backslashes
          jq '
            map({
              name: ((.pokemon.name // .title) | sub("\\s+V[0-9]+$"; "")),
              originalName: .title,
              category: (
                if (.title | ascii_downcase | contains("mega")) then "Mega"
                elif (.title | ascii_downcase | test("(articuno|zapdos|moltres|mew|mewtwo|celebi|lugia|ho-oh|entei|raikou|suicune|kyogre|groudon|rayquaza|deoxys|jirachi|darkrai|arceus|dialga|palkia|giratina|zekrom)")) then "Event"
                elif (.title | ascii_downcase | test("(christmas|halloween|love|galarian)")) then "Special"
                else "Standard"
                end
              ),
              price: 8.0,
              colors: (.filaments // [] | map({color: .color, grams: .weight_grams})),
              totalGrams: (.total_weight_grams // 0),
              filamentCost: ((.total_weight_grams // 0) * 0.012),
              profit: (8.0 - ((.total_weight_grams // 0) * 0.012)),
              url: ("https://www.n3dmelbourne.com/design/" + .slug),
              slug: .slug,
              lastUpdated: now | todateiso8601
            })
          ' /tmp/designs-array.json > data/n3d-designs.json

          echo "Saved $(jq length data/n3d-designs.json) designs"
          jq '.[0] | {name, category, totalGrams}' data/n3d-designs.json

      - name: Check for new designs
        run: |
          if [ -f data/n3d-designs-prev.json ]; then
            echo "Checking for new designs..."
            NEW_COUNT=$(jq -s '(.[0] | map(.slug)) - (.[1] | map(.slug)) | length' data/n3d-designs.json data/n3d-designs-prev.json)
            echo "New designs: $NEW_COUNT"
          else
            echo "First run - no previous data"
          fi
          cp data/n3d-designs.json data/n3d-designs-prev.json

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Sync N3D designs: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Changes pushed"
          fi
